name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e .
      - name: Run oum-worker tests
        run: PYTHONPATH=scripts pytest tests/test_oum_worker_*.py -q
